name: Deck Master CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "claude/**"
      - "chore/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deck-master-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests and autoplan smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python syntax
        run: python -m compileall scripts tests

      - name: Install project with dev dependencies
        run: python -m pip install --quiet -e ".[dev]"

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run static correctness checks
        run: python -m ruff check scripts tests

      - name: Enforce coverage floor
        if: matrix.python-version == '3.12'
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage report --fail-under=80

      - name: Run Skill OS contract & schema validation
        run: |
          set -euo pipefail
          python -m pytest tests/test_skill_manifest.py tests/test_stage_contract_registry.py \
            tests/test_workflow_state.py tests/test_stage_validation.py tests/test_skill_handoff.py \
            tests/test_workflow_approval.py tests/test_workflow_questions.py \
            tests/test_sourcing_plan_v2.py tests/test_page_package.py tests/test_build_manifest_v2.py \
            tests/test_workflow_autopilot_v2.py tests/test_workflow_cli.py tests/test_skill_doc_contract.py \
            tests/test_skill_os_migration.py tests/test_skill_os_release_contract.py -q

      - name: Run fixture autoplan smoke
        run: |
          set -euo pipefail
          RUNS_DIR="$(mktemp -d)"
          python scripts/deck_master.py autoplan \
            --brief-file examples/briefs/retail_digital_transformation.txt \
            --industry retail \
            --library-mode fixture \
            --run-mode fixture \
            --dev-allow-unsetup \
            --runs-dir "$RUNS_DIR" \
            --run-id ci-smoke \
            > "$RUNS_DIR/autoplan-output.json"
          python - "$RUNS_DIR" <<'PY'
          import json
          import sys
          from pathlib import Path

          runs_dir = Path(sys.argv[1])
          payload = json.loads((runs_dir / "autoplan-output.json").read_text(encoding="utf-8"))
          run_dir = Path(payload["run_dir"])
          required = [
              "request.json",
              "narrative_plan.json",
              "page_tasks.json",
              "sourcing_plan.json",
              "preview_manifest.json",
          ]
          missing = [name for name in required if not (run_dir / name).exists()]
          if missing:
              raise SystemExit(f"Missing smoke artifacts: {missing}")
          manifest = json.loads((run_dir / "preview_manifest.json").read_text(encoding="utf-8"))
          pages = manifest.get("pages", [])
          if len(pages) < 10:
              raise SystemExit(f"Expected at least 10 preview pages, got {len(pages)}")
          print(f"Autoplan smoke passed: {len(pages)} preview pages")
          PY

      - name: Run Technical Preview gate
        run: |
          set -euo pipefail
          RUNS_DIR="$(mktemp -d)"
          python scripts/deck_master.py autoplan \
            --brief-file examples/briefs/retail_digital_transformation.txt \
            --industry retail \
            --library-mode fixture \
            --run-mode fixture \
            --dev-allow-unsetup \
            --runs-dir "$RUNS_DIR" \
            --run-id ci-preview \
            > "$RUNS_DIR/autoplan-output.json"
          python scripts/deck_master.py preview-gate \
            --run-dir "$RUNS_DIR/ci-preview" \
            --expect-unconfigured-backend-ok

      - name: Build release tree smoke
        run: |
          set -euo pipefail
          OUT_DIR="$(mktemp -d)"
          python scripts/deck_master.py release-build --output "$OUT_DIR/release" --force
          python scripts/deck_master.py release-smoke --release-root "$OUT_DIR/release"

  rc_gate_ci:
    name: CI-tier rc-gate (reproducible subset, Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: python -m compileall scripts tests

      - name: Install project with dev dependencies
        run: python -m pip install --quiet -e ".[dev]"

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # The CI tier runs only the reproducible checks (schema, artifact,
      # release-smoke, fixture-e2e, browser-smoke, capability-lock closure)
      # and skips the local-only benchmark_aggregate + live backend-binding
      # checks. A fresh clone has no benchmarks/results/ and no bound
      # ppt-master backend, so the full tier would fail by design here.
      # If browser smoke proves flaky in CI, fall back to --skip-browser-smoke.
      - name: Run CI-tier rc-gate
        run: |
          set -euo pipefail
          OUT_DIR="$(mktemp -d)"
          python scripts/deck_master.py rc-gate \
            --tier ci \
            --require-browser-smoke \
            --output-dir "$OUT_DIR/rc-gate" \
            --force
          python - "$OUT_DIR/rc-gate/rc_gate_report.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          assert report["tier"] == "ci", f"unexpected tier: {report.get('tier')}"
          assert report["status"] == "pass", f"CI-tier rc-gate did not pass: {report['status']}"
          checks = {c["check_id"]: c for c in report["checks"]}
          assert checks["benchmark_aggregate"]["status"] == "skipped"
          assert checks["external_dependency_closure"]["status"] == "pass"
          print(f"CI-tier rc-gate passed ({report['summary']['checks']} checks)")
          PY
