<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deck Master Preview</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="shell">
      <aside class="rail">
        <div class="brand">
          <span class="eyebrow">Deck Master</span>
          <h1 id="deck-title">Studio</h1>
          <p id="deck-meta">Loading manifest...</p>
        </div>
        <form id="create-run-form" class="create-run">
          <label for="brief">New deck brief</label>
          <textarea id="brief" rows="6" placeholder="例：零售客户数字化转型方案，关注全渠道、库存可视化、最后一公里配送"></textarea>
          <div class="form-row">
            <label for="industry">Industry</label>
            <input id="industry" value="retail" placeholder="retail">
          </div>
          <div class="form-row">
            <label for="target-pages">Pages</label>
            <select id="target-pages">
              <option value="auto">Auto</option>
              <option value="15">15</option>
              <option value="30">30</option>
              <option value="60">60</option>
            </select>
          </div>
          <div class="form-row">
            <label for="library-mode">Library</label>
            <select id="library-mode">
              <option value="fixture">Demo</option>
              <option value="auto">Auto</option>
              <option value="real">Real</option>
            </select>
          </div>
          <button class="primary" type="submit" id="create-run">Generate draft</button>
          <p id="create-status" class="save-status"></p>
        </form>
        <div class="run-section">
          <span class="eyebrow">Runs</span>
          <div id="run-list" class="run-list"></div>
        </div>
        <div id="page-list" class="page-list"></div>
      </aside>

      <section class="stage">
        <div class="stage-toolbar">
          <button id="first-page">First</button>
          <button id="prev-page">Previous</button>
          <strong id="current-label">No page selected</strong>
          <button id="next-page">Next</button>
          <button id="last-page">Last</button>
        </div>
        <div id="preview-frame" class="preview-frame">
          <p>Select a page to preview.</p>
        </div>
      </section>

      <aside class="inspector">
        <div class="panel narrative-panel">
          <span class="eyebrow">Narrative Review</span>
          <h2 id="narrative-title">主线审查</h2>
          <div id="narrative-content" class="narrative-content">
            <p class="muted">选择 run 后加载叙事数据...</p>
          </div>
        </div>
        <div class="panel asset-signals-panel">
          <span class="eyebrow">Asset Signals</span>
          <h2 id="asset-signals-title">资产信号</h2>
          <div id="asset-signals-content" class="asset-signals-content">
            <p class="muted">选择 run 后加载资产信号...</p>
          </div>
        </div>
        <div class="panel governance-panel">
          <span class="eyebrow">Quality Governance</span>
          <h2 id="governance-title">质量治理</h2>
          <div id="governance-content" class="governance-content">
            <p class="muted">选择 run 后加载质量治理数据...</p>
          </div>
        </div>
        <div class="panel">
          <span class="eyebrow">Page Review</span>
          <h2 id="page-title">No page</h2>
          <dl id="page-details"></dl>
          <div id="page-narrative-detail" class="page-narrative-detail"></div>
          <div id="page-asset-signals-detail" class="page-asset-signals-detail"></div>
        </div>
        <div class="panel decision-panel">
          <label for="decision">Decision</label>
          <select id="decision">
            <option value="needs_review">Needs review</option>
            <option value="keep">Keep</option>
            <option value="replace">Replace</option>
            <option value="approved">Approved</option>
          </select>
          <label for="notes">Notes</label>
          <textarea id="notes" rows="7" placeholder="Add page-level notes..."></textarea>
          <button id="save-decision" class="primary">Save decision</button>
          <p id="save-status" class="save-status"></p>
        </div>
      </aside>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
